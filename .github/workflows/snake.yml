name: GitHub Snake Game

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

            dist/github-snake-ocean.svg?palette=github-dark&color_snake=#38BDF8

            dist/github-snake-neon.svg?palette=github-dark&color_snake=#22D3EE

            dist/ocean.gif?palette=github-dark&color_snake=#22D3EE

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build site folder
        run: |
          mkdir -p site
          cp -r dist site/
          cp -r snake-web site/

      - name: Deploy site to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          commit_message: "Publish interactive snake + assets [skip ci]"
