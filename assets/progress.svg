<svg xmlns="http://www.w3.org/2000/svg" width="600" height="18" viewBox="0 0 600 18" role="img" aria-label="Profile progress">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect x="0" y="2" width="600" height="14" rx="7" fill="#0b1220" />
  <!-- animated foreground showing progress (example 65%) -->
  <rect x="0" y="2" width="0" height="14" rx="7" fill="url(#g)">
    <animate attributeName="width" from="0" to="390" dur="1.2s" fill="freeze" />
  </rect>
  <text x="300" y="12" font-size="11" text-anchor="middle" fill="#d9f9ff">Profile progress — 65%</text>
</svg>
