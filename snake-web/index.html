        <h1>Interactive Snake</h1>
        <p>Play a lightweight snake demo. This page is hosted from the repository's published site.</p>

            <canvas id="game" width="400" height="400"></canvas>
            <div class="controls">
                <button id="restart">Restart</button>
                <label>Speed <input id="speed" type="range" min="1" max="10" value="6" /></label>
            </div>
        </div>

        <p class="note">If the interactive page is not available, the README uses a generated GIF fallback.</p>
        <p>
            <a href="resume.md" download>Download Resume</a> |
